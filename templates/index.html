<!DOCTYPE html>

    <title>PDF Replace Tool</title>

<body>

<h2>PDF Text Replace (AI OCR)</h2>

<form method="post" enctype="multipart/form-data">

```
<label>Select PDF Files:</label><br>
<input type="file" name="files" multiple required><br><br>

<label>Find Text:</label><br>
<input type="text" name="find_text" required><br><br>

<label>Replace Text:</label><br>
<input type="text" name="replace_text" required><br><br>

<button type="submit">Upload & Process</button>
```

</form>

</body>
